<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المساعدين الشخصيين - Smarter with AI</title>
    
    <!-- تحميل Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تحميل خط Cairo من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- ستايلات إضافية لتطبيق الخط -->
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen" style="font-family: 'Cairo', sans-serif;">

    <!-- ======================= -->
    <!--          الهيدر         -->
    <!-- ======================= -->
    <header class="bg-gradient-to-r from-teal-700 to-cyan-800 shadow-md text-white py-6">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold">
                    دليل المساعدين الشخصيين
                </h1>
                <p class="mt-1 text-lg text-white/80">
                    حصرياً لأعضاء كورس <span class="font-semibold">Smarter with AI</span>
                </p>
            </div>
        </div>
    </header>

    <!-- ======================= -->
    <!--     المحتوى الرئيسي     -->
    <!-- ======================= -->
    <main class="flex-grow bg-gray-50 text-gray-900">
        <div class="container mx-auto px-4 py-8 md:py-12">
            
            <!-- --- شريط البحث --- -->
            <div class="mb-10">
                <div class="relative w-full max-w-lg mx-auto">
                    <input
                        id="search-bar"
                        type="text"
                        placeholder="ابحث عن مساعد..."
                        class="w-full px-5 py-3 pr-12 rounded-full bg-white text-gray-900 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-teal-600"
                    />
                    <div class="absolute top-1/2 right-4 transform -translate-y-1/2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-400">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- --- حاوية النتائج (للبحث) --- -->
            <div id="search-results" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- نتائج البحث تظهر هنا -->
            </div>
            <div id="search-empty-state" class="hidden col-span-full text-center py-10">
                <p class="text-xl text-gray-500">
                    لا توجد نتائج تطابق بحثك...
                </p>
            </div>

            <!-- --- حاوية العرض المصنف (الافتراضي) --- -->
            <div id="categorized-view" class="space-y-12">
                <!-- --- القسم الأول: المساعدون الحصريون --- -->
                <section>
                    <h2 class="text-3xl font-bold text-teal-700 mb-8 border-r-4 border-teal-500 pr-4">
                        المساعدون الحصريون (Bonus)
                    </h2>
                    <div id="bonus-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- البطاقات الحصرية تظهر هنا -->
                    </div>
                </section>

                <!-- --- فاصل --- -->
                <div class="border-t border-gray-200 my-12"></div>

                <!-- --- القسم الثاني: المساعدون العامون --- -->
                <h2 class="text-3xl font-bold text-teal-700 mb-8 border-r-4 border-teal-500 pr-4">
                    مساعدين متخصصين بواسطة آخرين (تم تجميعهم خصيصًا لكم)
                </h2>
                <div id="public-sections" class="space-y-12">
                    <!-- الأقسام العامة تظهر هنا -->
                </div>
            </div>

        </div>
    </main>

    <!-- ======================= -->
    <!--          الفوتر         -->
    <!-- ======================= -->
    <footer class="bg-gradient-to-r from-teal-700 to-cyan-800 py-6 mt-12">
        <div class="container mx-auto px-4 text-center text-sm flex flex-col gap-1">
            <p class="text-white/80">
                مبسوطين إنك في الكورس معانا 💚
            </p>
            <p class="font-semibold text-white/95">
                خليك دايمًا Smarter With Ai
            </p>
        </div>
    </footer>


    <!-- ======================= -->
    <!--     المنطق و البيانات     -->
    <!-- ======================= -->
    <script>
        // --- 0. بيانات المساعدين ---
        const bonusAssistantsData = [
            { id: "b1", name: "Presentation Mood", description: "مساعد عروض احتrafi يصمم، ينسق، ويولّد عروض متكاملة بأسلوب مهني", chatgpt: "https://chatgpt.com/g/g-68fff06a60e881918be273126a53ce97-presentation-mood", gemini: "https://gemini.google.com/gem/a5583365f87f" },
            { id: "b2", name: "Video Mood", description: "مخرج ذكي شامل يصمم Moodboard وسيناريوهات احترافية لأي أداة فيديو", chatgpt: "https://chatgpt.com/g/g-68ff5eaa948c8191b97b52768811dec8-video-mood", gemini: "https://gemini.google.com/gem/dbd9d2431eca" },
            { id: "b3", name: "Image Mood", description: "شريك بصري ذكي يقترح برومبتات وأماكن تنفيذها بسهولة", chatgpt: "https://chatgpt.com/g/g-68fea03a56dc8191a1a9d28a4fad9fca-image-mood", gemini: "https://gemini.google.com/gem/d17049195aae" },
            { id: "b4", name: "Web/App Mood", description: "مساعد ذكاء اصطناعي لتحويل الأفكار إلى تطبيقات ومواقع متكاملة", chatgpt: "https://chatgpt.com/g/g-68f871de1834819187de2b11bd4af145-web-app-mood", gemini: "https://gemini.google.com/gem/ccc6a7afa824" },
            { id: "b5", name: "NotebookLM Mood", description: "مساعد NotebookLM ذكي يصمم أوامر احترافية لمحتوى فيديو وصوت وتقارير بأسلوب مخصص", chatgpt: "https://chatgpt.com/g/g-68f6cc30b078819197b1375a44e8ca83-notebooklm-mood", gemini: "https://gemini.google.com/gem/ac08e2d00ff7" },
            { id: "b6", name: "المنسق المحترف", description: "منسق نصوص محترف يعيد تنظيم أي محتوى ليبدو احترافياً دون تغيير المعنى", chatgpt: "https://chatgpt.com/g/g-68f50e7379b88191add70c6858cc7b6e-lmnsq-lmhtrf", gemini: "https://gemini.google.com/gem/a41d02a879cc" },
            { id: "b7", name: "Gem Builder Mood", description: "مساعد استراتيجي خبير، يحول أي فكرة بسرعة وكفاءة إلى مساعد شخصي عالي الجودة", chatgpt: "https://chatgpt.com/g/g-68f3759786e48191b7ce1e7ca3f11158-gem-builder-mood", gemini: "https://gemini.google.com/gem/98bb0d1cf7db" },
            { id: "b8", name: "Smarter Dentist with AI", description: "زميل رقمي في طب الأسنان يشرح ويعلّم بالتعاطف والمنطق والدقة", chatgpt: "https://chatgpt.com/g/g-68f198034578819190d5f28d263a206c-smarter-dentist-with-ai", gemini: null },
            { id: "b9", name: "Smarter Mood", description: "مساعد ذكي بيبسط ويلمّ المعلومة بأسلوب د. محمود حرب، بطريقته الخاصة وبمنتهى البساطة", chatgpt: "https://chatgpt.com/g/g-68f0f763bd24819192d82c0187cad244-smarter-mood", gemini: "https://gemini.google.com/gem/2c3c6d25f368" },
            { id: "b10", name: "Infographic Mood", description: "مساعد متخصص في تحويل النصوص إلى انفوجرافيك تفصيلي وجذاب بصرياً", chatgpt: null, gemini: "https://gemini.google.com/gem/22d7d2c55efc" },
            { id: "b11", name: "Prompt Mood", description: "مساعد متخصص في هندسة الأوامر (Prompts) لتحسين جودة النتائج من الذكاء الاصطناعي.", chatgpt: "https://chatgpt.com/g/g-690a5dc396108191adbb275002d417ed-prompt-mood", gemini: "https://gemini.google.com/gem/12D63r-FZr6mZ3pJvbnoWhQem1oX4jRYc?usp=sharing" }
        ];

        const publicAssistantsData = [
            { categoryName: "هندسة الأوامر (Prompts)", assistants: [
                { id: "p1", name: "مولد الأوامر الذكي", description: "أداة خارجية تساعدك على بناء أوامر احترافية.", url: "https://generateprompt.ai/" },
                { id: "p2", name: "Prompt Engineer", description: "مساعدك الشخصي لإنشاء الأوامر (Prompts) الفعالة.", url: "https://chatgpt.com/g/g-5XtVuRE8Y-prompt-engineer" },
                { id: "p3", name: "الدليل الشامل لهندسة الأوامر", description: "مجموعة كبيرة من الأوامر الجاهزة والدلائل الشاملة.", url: "https://drive.google.com/drive/folders/1Nqhe2Yksu6e-ci4ajN4sJjZ_3ClwmIxX?usp=sharing" }
            ]},
            { categoryName: "البحث والتلخيص العلمي", assistants: [
                { id: "p4", name: "👌Academic Assistant Pro", description: "Professional academic assistant with a professorial touch.", url: "https://chatgpt.com/g/g-UubB08D4y-academic-assistant-pro" },
                { id: "p5", name: "Scholar GPT", description: "تعزيز البحث العلمي بالوصول إلى أكثر من 200 مليون مصدر.", url: "https://chatgpt.com/g/g-kZ0eYXlJe-scholar-gpt" },
                { id: "p6", name: "Consensus", description: "أداة بحث تستخرج النتائج من الأوراق العلمية والبحوث المنشورة.", url: "https://chatgpt.com/g/g-bo0FiWLY7-consensus" },
                { id: "p7", name: "دليل أوامر البحث العلمي", description: "ملف يحتوي على أفضل الأوامر الاحترافية المخصصة للبحث العلمي.", url: "https://drive.google.com/file/d/122N6rG3T5DGWuOvAnHeHpbuBGggGQOFu/view?usp=sharing" }
            ]},
            { categoryName: "الشرح وتبسيط المعلومات", assistants: [
                { id: "p8", name: "Smarter Mood", description: "مدرب على أسلوبي في التلخيص لشرح أي موضوع ببساطة.", url: "https://chatgpt.com/g/g-68f0f763bd24819192d82c0187cad244-smarter-mood" },
                { id: "p9", name: "Universal Primer", description: "أسرع طريقة لتعلم أي شيء صعب.", url: "https://chatgpt.com/g/g-GbLbctpPz-universal-primer" }
            ]},
            { categoryName: "انشاء المحتوى المرئي والبيانات", assistants: [
                { id: "p10", name: "Data Analysis & Report AI🌍", description: "تحليل بيانات وتقارير مفصلة مع رسوم بيانية.", url: "https://chatgpt.com/g/g-2OebMtWeG-data-analysis-report-ai" },
                { id: "p11", name: "ShowMe: Presentation & Diagram", description: "لإنشاء العروض التقديمية والرسوم البيانية والمخططات.", url: "https://chatgpt.com/g/g-5QhhdsfDj-presentation-diagram-generator-by-showme" },
                { id: "p12", name: "Storybook", description: "لإنشاء قصة مصورة مخصصة للأطفال أو البالغين.", url: "https://gemini.google.com/u/0/gem/storybook" }
            ]},
            { categoryName: "الكتابة والتنسيق العام", assistants: [
                { id: "p13", name: "Write For Me", description: "Supercharged writing assistant⚡.", url: "https://chatgpt.com/g/g-B3hgivKK9-write-for-me" },
                { id: "p14", name: "المنسق المحترف", description: "للتنسيق الاحترافي للنصوص وإضافة لمسة احترافية.", url: "https://gemini.google.com/u/0/gem/a41d02a879cc" },
                { id: "p15", name: "AI Humanizer", description: "لتحويل النصوص المولدة آلياً لمحتوى بلمسة بشرية.", url: "https://chatgpt.com/g/g-2azCVmXdy-ai-humanizer" }
            ]},
            { categoryName: "أدوات مساعدة وانتاجية", assistants: [
                { id: "p16", name: "Decision Maker", description: "أفضل صانع قرار في العالم لمساعدتك على الاختيار.", url: "https://chatgpt.com/g/g-JFYwMmo6K-decision-maker" }
            ]},
            { categoryName: "التسويق وصناعة المحتوى", assistants: [
                { id: "p17", name: "Ask Hani Shaker 3.0", description: "مساعد متخصص في التسويق وصناعة المحتوى.", url: "https://chatgpt.com/g/g-68d1d01909d48191840bb52975a4b1e9-ask-hani-shaker-3-0" },
                { id: "p18", name: "Copywriter GPT", description: "خبير في صياغة الإعلانات، التسويق، وبناء العلامات التجارية.", url: "https://chatgpt.com/g/g-Ji2QOyMml-copywriter-gpt-marketing-branding-ads" },
                { id: "p19", name: "MARKETING", description: "Your expert mentor in advertising & Guiding Media Professionals.", url: "https://chatgpt.com/g/g-DtjWjSDiv-marketing" }
            ]}
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const searchBar = document.getElementById('search-bar');
            const categorizedView = document.getElementById('categorized-view');
            const searchResultsContainer = document.getElementById('search-results');
            const searchEmptyState = document.getElementById('search-empty-state');
            const bonusGrid = document.getElementById('bonus-grid');
            const publicSectionsContainer = document.getElementById('public-sections');

            // --- دالة إنشاء زر المساعد الحصري ---
            function createBonusCard(assistant) {
                const renderButton = (platform, url) => {
                    const isEnabled = url !== null;
                    const baseStyle = "px-4 py-2 rounded-lg text-sm font-semibold text-white transition-opacity duration-200 flex-1 text-center";
                    let platformStyle = "";
                    if (platform === 'ChatGPT') {
                        platformStyle = isEnabled ? "bg-blue-600 hover:opacity-80" : "bg-gray-300 opacity-60 cursor-not-allowed";
                    } else if (platform === 'Gemini') {
                        platformStyle = isEnabled ? "bg-purple-600 hover:opacity-80" : "bg-gray-300 opacity-60 cursor-not-allowed";
                    }
                    if (isEnabled) {
                        return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="${baseStyle} ${platformStyle}">${platform}</a>`;
                    } else {
                        return `<span class="${baseStyle} ${platformStyle}">${platform}</span>`;
                    }
                };

                return `
                    <div class="rounded-2xl shadow-lg p-0.5 bg-gradient-to-br from-teal-500 to-cyan-600 transition-shadow duration-300 hover:shadow-xl">
                        <div class="bg-white rounded-[22px] p-8 flex flex-col justify-between h-full">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900 mb-3">${assistant.name}</h3>
                                <p class="text-sm text-gray-600 leading-relaxed">${assistant.description}</p>
                            </div>
                            <div class="mt-8 flex items-center gap-x-3">
                                ${renderButton('ChatGPT', assistant.chatgpt)}
                                ${renderButton('Gemini', assistant.gemini)}
                            </div>
                        </div>
                    </div>`;
            }

            // --- دالة إنشاء زر المساعد العام ---
            function createPublicCard(assistant) {
                return `
                    <div class="rounded-2xl shadow-lg p-0.5 bg-gradient-to-br from-teal-500 to-cyan-600 transition-shadow duration-300 hover:shadow-xl">
                        <div class="bg-white rounded-[22px] p-8 flex flex-col justify-between h-full">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900 mb-3">${assistant.name}</h3>
                                <p class="text-sm text-gray-600 leading-relaxed">${assistant.description}</p>
                            </div>
                            <div class="mt-8">
                                <a href="${assistant.url}" target="_blank" rel="noopener noreferrer"
                                   class="block w-full text-center px-4 py-3 rounded-lg text-sm font-semibold text-white transition-opacity duration-200 bg-teal-600 hover:bg-teal-700">
                                    زيارة الرابط
                                </a>
                            </div>
                        </div>
                    </div>`;
            }

            // --- دالة العرض الرئيسية (مع البحث) ---
            function renderContent(query = "") {
                const lowerCaseQuery = query.toLowerCase();

                // إفراغ الحاويات
                bonusGrid.innerHTML = "";
                publicSectionsContainer.innerHTML = "";
                searchResultsContainer.innerHTML = "";
                
                // إخفاء/إظهار الحاويات
                searchEmptyState.classList.add('hidden');

                if (lowerCaseQuery) {
                    // --- 1. حالة البحث ---
                    categorizedView.classList.add('hidden');
                    searchResultsContainer.classList.remove('hidden');
                    
                    const allBonusAssistants = bonusAssistantsData.map(a => ({ ...a, type: 'bonus' }));
                    const allPublicAssistants = publicAssistantsData.flatMap(c => c.assistants).map(a => ({ ...a, type: 'public' }));
                    const allAssistants = [...allBonusAssistants, ...allPublicAssistants];

                    const results = allAssistants.filter(assistant =>
                        assistant.name.toLowerCase().includes(lowerCaseQuery) ||
                        assistant.description.toLowerCase().includes(lowerCaseQuery)
                    );

                    if (results.length > 0) {
                        results.forEach(assistant => {
                            const cardHTML = assistant.type === 'bonus' 
                                ? createBonusCard(assistant) 
                                : createPublicCard(assistant);
                            searchResultsContainer.innerHTML += cardHTML;
                        });
                    } else {
                        searchEmptyState.classList.remove('hidden');
                    }

                } else {
                    // --- 2. الحالة الافتراضية (بدون بحث) ---
                    categorizedView.classList.remove('hidden');
                    searchResultsContainer.classList.add('hidden');

                    // عرض المساعدين الحصريين
                    bonusAssistantsData.forEach(assistant => {
                        bonusGrid.innerHTML += createBonusCard(assistant);
                    });

                    // عرض المساعدين العامين (مصنفين)
                    publicAssistantsData.forEach(category => {
                        let categoryHTML = `
                            <section key="${category.categoryName}" class="mb-12">
                                <h3 class="text-2xl font-semibold text-gray-800 mb-6">
                                    ${category.categoryName}
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    ${category.assistants.map(createPublicCard).join('')}
                                </div>
                            </section>`;
                        publicSectionsContainer.innerHTML += categoryHTML;
                    });
                }
            }

            // --- ربط حدث البحث ---
            searchBar.addEventListener('input', (e) => {
                renderContent(e.target.value);
            });

            // --- العرض الأولي ---
            renderContent();
        });
    </script>

</body>
</html>
